name: Run
run-name: Process Notes Folder (${{ github.event_name }})

on:
  workflow_dispatch:

concurrency:
  group: group-note-processing
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      LOGGING_LEVEL: ${{ vars.LOGGING_LEVEL }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      INPUT_FOLDER_ID: '1KHCvKl1j4sutaw9GqRFxeE0ruGWowy8a'
      PROCESSED_FOLDER_ID: '1F6P9rwirPqv4LZKPbkepkBPpWWTtnjGb'
      OUTPUT_FOLDER_ID: '10UJod9v7_fjEfWllo_R6iOGYMs4mfbJk'
      LLM_PROVIDER: ${{ vars.LLM_PROVIDERS }}
      #LLM_MODEL:
      #MAX_FILES_PER_RUN:
      #MIN_TRANSCRIPT_CHARS:


    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Poetry
        run: |
          pip install poetry

      - name: 🧰 Install dependencies
        run: |
          poetry install
          poetry add git+https://github.com/kaianolevine/kaiano-common-utils.git

      - name: 🏃 Run processor
        run: |
          poetry run python -m notes_processor